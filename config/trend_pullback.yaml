trend_pullback:
  paper_trading_only: true
  timing_mode: completed_daily_bar
  min_pullback_bars: 2
  max_pullback_bars: 10
  proximity:
    ema20_max_distance_pct: 2.5
    ema50_max_distance_pct: 2.5
  trend:
    require_price_above_ema200: true
    require_ema20_above_ema50: true
    require_ema50_above_ema200: true
    reject_close_below_ema50: true
  recovery:
    require_close_above_prior_high: true
    min_recovery_volume_ratio: 1.05
    volume_average_period: 20
  risk:
    max_atr_pct: 8.0
    min_reward_risk_proxy: 1.5
  deferred_gates:
    earnings_risk_source_verified: false
  disabled_behaviors:
    intrabar_validity: false
    create_orders: false
    portfolio_sizing: false
    buy_watch_avoid_classifications: false
    backtest_result_creation: false
    telegram_delivery: false

