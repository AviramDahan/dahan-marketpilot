    - daily_filter_4h_setup
    - daily_filter_4h_setup_1h_optional
  environment_modes_are_separate:
    - backtest
    - shadow
    - paper
  primary_signal_resolution: completed_daily_bar
  multi_timeframe:
    daily:
      mandatory: true
      responsibility: filter_context
    four_hour:
      mandatory_in_modes:
        - daily_filter_4h_setup
        - daily_filter_4h_setup_1h_optional
      responsibility: primary_setup_signal
      alignment: market_open_anchored_regular_hours
      exchange_timezone: America/New_York
      extended_hours: false
      partial_session_generates_signal: false
    one_hour:
      optional_in_modes:
        - daily_filter_4h_setup_1h_optional
      responsibility: confirmation_only
      can_create_trade_independently: false
  disabled_behaviors:
    create_orders: false
    portfolio_sizing: false
    backtest_result_creation: false
    telegram_delivery: false
    paper_deployment: false
