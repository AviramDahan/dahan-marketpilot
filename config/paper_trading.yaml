    real_broker_adapters: false
    live_money_paths: false
    automatic_deployment: false
    telegram_delivery_required_for_safety: false
    fake_quantconnect_deployment_state: false
    fake_paper_portfolio_authority: false
    leverage: false
    margin: false
    short_selling: false
    options: false
    futures: false
    crypto: false
    forex: false
