name: Weekly Offline Validation

"on":
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-offline-validation:
    name: Weekly deterministic validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11.9"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run offline validation
        run: python -m pytest -q
      - name: Record external validation status
        shell: bash
        run: |
          {
            echo "## Weekly validation"
            echo ""
            echo "offline_tests: passed"
            echo "quantconnect_external: not_run"
            echo "dashboard_external: not_run"
            echo "reason: Weekly validation is deterministic and offline by default."
          } >> "$GITHUB_STEP_SUMMARY"
